<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solidity Tutorial — Faucet</title>
  <style>
    :root {
      color-scheme: light dark;
      --fg: #1a1a1a;
      --muted: #6b7280;
      --ok: #0a8c5c;
      --err: #c1392b;
      --bg: #fafafa;
      --card: #ffffff;
      --border: #e5e7eb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #f4f4f5;
        --muted: #a1a1aa;
        --ok: #34d399;
        --err: #f87171;
        --bg: #0f0f10;
        --card: #1a1a1c;
        --border: #2a2a2d;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
    }
    main {
      max-width: 520px;
      margin: 3rem auto;
      padding: 0 1rem;
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 0.25rem 0;
    }
    p.lede {
      color: var(--muted);
      margin: 0 0 1.5rem 0;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .chain-info {
      font-size: 0.875rem;
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 0.25rem 1rem;
    }
    .chain-info dt {
      color: var(--muted);
      margin: 0;
    }
    .chain-info dd {
      margin: 0;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      word-break: break-all;
    }
    label {
      display: block;
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 0.375rem;
    }
    input[type="text"] {
      width: 100%;
      padding: 0.625rem 0.75rem;
      font-size: 1rem;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    input[type="text"]:focus {
      outline: 2px solid #6366f1;
      outline-offset: -1px;
    }
    button {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 0.75rem;
    }
    button:hover:not(:disabled) {
      background: #4f46e5;
    }
    button:disabled {
      opacity: 0.5;
      cursor: progress;
    }
    #status {
      margin-top: 0.875rem;
      min-height: 1.25em;
      font-size: 0.875rem;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      word-break: break-all;
    }
    #status.ok { color: var(--ok); }
    #status.err { color: var(--err); }
    a { color: inherit; }
    footer {
      font-size: 0.8125rem;
      color: var(--muted);
      margin-top: 1.5rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <h1>Solidity Tutorial Faucet</h1>
    <p class="lede">Drops <strong>1 ETH</strong> onto any address on the local anvil chain.</p>

    <section class="card">
      <dl class="chain-info">
        <dt>RPC URL</dt>      <dd id="info-rpc">—</dd>
        <dt>Chain ID</dt>     <dd id="info-chain">31337</dd>
        <dt>Faucet</dt>       <dd id="info-faucet">0xa0Ee7A142d267C1f36714E4a8F75612F20a79720</dd>
      </dl>
    </section>

    <section class="card">
      <label for="addr">Recipient address</label>
      <input id="addr" type="text" placeholder="0x..." spellcheck="false" autocomplete="off">
      <button id="claim">Send 1 ETH</button>
      <div id="status" aria-live="polite"></div>
    </section>

    <footer>
      Add the chain to MetaMask, then paste your wallet address above.
      Challenges deployed at <a href="./data/addresses.json">/data/addresses.json</a>.
    </footer>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
