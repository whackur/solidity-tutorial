# Solidity Tutorial — anvil + auto-deploy stack.
#
# Usage (from repo root):
#   1. forge soldeer install         # once, to populate dependencies/
#   2. cp .env.sample .env           # optional — override anvil host/port/etc.
#   3. docker compose up -d --build
#   4. open http://<instructor-ip>:8888/        # faucet UI
#      cat docker/shared/addresses.json         # deployed challenge addresses
#
# The anvil container exposes its RPC on host port 8545 (bound to 0.0.0.0).
# The faucet container serves a static page on host port 8080 that lets a
# student request 1 ETH onto any address using anvil's default account #0.

services:
  anvil:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: solidity-tutorial-anvil:dev
    container_name: solidity-tutorial-anvil
    ports:
      # Explicit 0.0.0.0 bind on the host side so LAN/VPN clients reach
      # anvil via the instructor's machine IP.
      - "0.0.0.0:${ANVIL_PORT:-8545}:8545"
    volumes:
      - ./docker/shared:/shared
    environment:
      ANVIL_HOST: "${ANVIL_HOST:-0.0.0.0}"
      ANVIL_PORT: "${ANVIL_PORT:-8545}"
      ANVIL_CHAIN_ID: "${ANVIL_CHAIN_ID:-31337}"
      ANVIL_MNEMONIC: "${ANVIL_MNEMONIC:-test test test test test test test test test test test junk}"
    healthcheck:
      test: ["CMD-SHELL", "cast block-number --rpc-url http://localhost:8545 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  faucet:
    image: nginx:alpine
    container_name: solidity-tutorial-faucet
    ports:
      - "0.0.0.0:${FAUCET_PORT:-8888}:80"
    volumes:
      # Static page (index.html + app.js). Read-write on the docker side
      # only so nested mountpoint creation works on Windows hosts; nginx
      # itself never writes here.
      - ./web:/usr/share/nginx/html
      # Expose the auto-generated addresses.json so the page can link to it
      # at /data/addresses.json.
      - ./docker/shared:/usr/share/nginx/html/data:ro
    depends_on:
      anvil:
        condition: service_healthy
    restart: unless-stopped
