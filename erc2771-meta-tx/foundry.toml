[profile.default]
auto_detect_remappings = false
evm_version = "osaka"
ignored_error_codes = [2424]
libs = ["../dependencies"]
optimizer = true
optimizer_runs = 200
out = "out"
remappings = ["@openzeppelin/contracts/=../dependencies/@openzeppelin-contracts-5.6.1/", "forge-std/=../dependencies/forge-std-1.16.1/src/"]
script = "script"
solc = "0.8.35"
src = "src"
test = "test"

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { chain = 11155111, key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.etherscan.io/api" }
